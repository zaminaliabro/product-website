<!doctype html>
<html>
  <head>
    <title>Add Product</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 50px 20px;
        flex-direction: column;
        align-items: center;
      }

      .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }

      input,
      textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
        outline: none;
        transition: 0.3s;
      }

      input:focus,
      textarea:focus {
        border-color: #4facfe;
        box-shadow: 0 0 5px rgba(79, 172, 254, 0.5);
      }

      textarea {
        resize: none;
        height: 80px;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #4facfe;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #2f8ef5;
      }

      /* Product cards container */
      #productShow {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 30px;
        justify-content: center;
        width: 100%;
        max-width: 1000px;
      }

      /* Individual product card */
      .product-card {
        background-color: #ffffff;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 200px;
        text-align: center;
      }

      .product-card h3 {
        margin-bottom: 10px;
        font-size: 18px;
      }

      .product-card p {
        margin: 5px 0;
        font-size: 14px;
        color: #333;
      }
      .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        transition: 0.3s;
      }
      .product-card img {
        width: 100%;
        height: 120px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 10px;
      }
      .product-card img {
        width: 100%;
        height: 120px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 10px;
      }
      .delete-btn {
        margin-top: 10px;
        padding: 5px 10px;
        background: red;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Add Product</h2>
      <form id="productForm">
        <input type="text" id="name" placeholder="Product Name" required />
        <input type="number" id="price" placeholder="Product Price" required />
        <input type="text" id="image" placeholder="Product Image URL" />
        <input type="text" id="color" placeholder="Product Color" />
        <textarea id="description" placeholder="Product Description"></textarea>
        <button type="submit">Add Product</button>
      </form>
    </div>

    <div id="productShow"></div>

    <script src="script.js"></script>
  </body>
</html>
